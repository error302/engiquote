name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # Test Server
      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma client
        working-directory: server
        run: npx prisma generate

      # Test Client
      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Lint client
        working-directory: client
        run: npm run lint || true

  deploy:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push Docker images
        run: |
          docker build -t engiquote-server:latest ./server
          docker build -t engiquote-client:latest ./client
          # Add your registry commands here
          # docker push registry/engiquote-server:latest
          # docker push registry/engiquote-client:latest

      - name: Deploy to server
        run: |
          # Add your deployment commands here
          # docker-compose -f docker-compose.yml up -d
          echo "Deployment completed"